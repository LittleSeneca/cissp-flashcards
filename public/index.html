<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CISSP Flashcards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a href="#/" class="logo">CISSP</a>
    <div class="search-wrap" id="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5 14 14"/></svg>
      <input type="text" id="search-input" placeholder="Search topics, domains, tags… ( / )" autocomplete="off" spellcheck="false">
      <div id="search-results" class="search-dropdown" hidden></div>
    </div>
    <nav id="breadcrumb"></nav>
  </header>
  <div class="layout">
    <nav id="left-nav" class="left-nav"></nav>
    <main id="app"><p class="loading">Loading…</p></main>
  </div>
  <script src="mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: false, theme: 'base', themeVariables: { primaryColor: '#e0e7ff', primaryTextColor: '#1e1b4b', primaryBorderColor: '#6366f1', lineColor: '#6366f1', secondaryColor: '#f0fdf4', tertiaryColor: '#fef9c3' } });</script>
  <script src="app.js"></script>
</body>
</html>
